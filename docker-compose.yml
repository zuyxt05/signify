# ============================================
# Signify - Docker Compose
# ============================================
# Chạy: docker-compose up -d
# Dừng: docker-compose down
# Xem logs: docker-compose logs -f
# ============================================

services:
  # ==========================================
  # PostgreSQL Database
  # ==========================================
  postgres:
    image: postgres:16-alpine
    container_name: signify-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: signify
      POSTGRES_USER: signify_user
      POSTGRES_PASSWORD: signify_password_123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signify_user -d signify"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Redis Cache
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: signify-redis
    restart: unless-stopped
    command: redis-server --requirepass signify_redis_123
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "signify_redis_123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Backend API + WebSocket
  # ==========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: signify-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: production
      PORT: 8080

      # PostgreSQL
      DB_NAME: signify
      DB_USER: signify_user
      DB_PASSWORD: signify_password_123
      DB_HOST: postgres
      DB_PORT: 5432

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: signify_redis_123

      # JWT
      JWT_SECRET: signify-docker-jwt-secret-change-in-production

      # CORS - cho phép frontend gọi API
      REACT_API: http://localhost:3000

      # DB Sync
      DB_ALTER: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ==========================================
  # Frontend (React + Nginx)
  # ==========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_SERVER_URL: http://localhost:8080/api
        REACT_APP_WEBSOCKET_URL: ws://localhost:8080
    container_name: signify-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
